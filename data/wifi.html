<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Settings - UkieLab Display</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        header .logo { font-size: 48px; margin-bottom: 8px; }
        header h1 { font-size: 24px; color: #4fc3f7; margin-bottom: 4px; }
        header .subtitle { color: #888; font-size: 14px; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 {
            color: #4fc3f7;
            margin-bottom: 16px;
            font-size: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
            font-size: 13px;
        }
        .network-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .network-item {
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .network-item:hover {
            border-color: rgba(255, 255, 255, 0.25);
        }
        .network-item.selected {
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.1);
        }
        .network-icon { font-size: 18px; flex-shrink: 0; }
        .network-name { flex: 1; }
        .form-group { margin-bottom: 16px; }
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        input::placeholder { color: #666; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #4fc3f7;
            color: #000;
        }
        .btn-primary:hover:not(:disabled) { background: #29b6f6; }
        .btn-primary:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-top: 10px;
        }
        .btn-secondary:hover:not(:disabled) { background: rgba(255, 255, 255, 0.18); }
        .status {
            text-align: center;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        .status.success {
            display: block;
            background: rgba(0, 200, 83, 0.15);
            border: 1px solid #00c853;
            color: #95d5b2;
        }
        .status.error {
            display: block;
            background: rgba(255, 100, 100, 0.15);
            border: 1px solid #ff6464;
            color: #f48c8c;
        }
        .connected-info {
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid #00c853;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }
        .connected-info .icon { font-size: 28px; margin-bottom: 8px; }
        .connected-info .network-name {
            font-size: 16px;
            font-weight: 600;
            margin: 4px 0 12px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 14px;
        }
        .scan-btn {
            display: inline-block;
            color: #4fc3f7;
            cursor: pointer;
            text-decoration: underline;
            font-size: 13px;
            margin-top: 4px;
        }
        footer {
            text-align: center;
            margin-top: 24px;
            padding-bottom: 20px;
            color: #555;
            font-size: 13px;
        }
        footer a { color: #4fc3f7; text-decoration: none; margin: 0 10px; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📶</div>
            <h1>WiFi Settings</h1>
            <p class="subtitle">Connect your UkieLab Display to the internet</p>
        </header>

        <div id="status" class="status"></div>

        <div id="connectedCard" class="connected-info" style="display:none;">
            <div class="icon">&#10003;</div>
            <div>Connected to</div>
            <div class="network-name" id="connectedNetwork"></div>
            <button class="btn btn-secondary" onclick="disconnect()">Disconnect</button>
        </div>

        <div class="card">
            <h2>Available Networks</h2>
            <ul id="networkList" class="network-list">
                <li class="loading">Scanning for networks...</li>
            </ul>

            <div class="form-group">
                <label for="password">WiFi Password</label>
                <input type="password" id="password" placeholder="Enter password" disabled />
            </div>

            <button id="connectBtn" class="btn btn-primary" onclick="connect()" disabled>
                Connect
            </button>
        </div>

        <footer>
            <a href="/">Settings</a> |
            <a href="/wifi">WiFi</a> |
            <a href="/update">Update</a>
        </footer>
    </div>

    <script>
        let selectedNetwork = null;
        let scanRetries = 0;

        document.addEventListener('DOMContentLoaded', function() {
            loadNetworks();
            checkConnection();
        });

        function loadNetworks() {
            const list = document.getElementById('networkList');
            list.innerHTML = '<li class="loading">Scanning for networks...</li>';

            fetch('/wifiList')
                .then(r => r.json())
                .then(networks => {
                    if (networks.length === 0) {
                        scanRetries++;
                        if (scanRetries < 4) {
                            list.innerHTML = '<li class="loading">Scanning...<br><span style="font-size:12px;color:#666">Attempt ' + scanRetries + ' of 3</span></li>';
                            setTimeout(loadNetworks, 2000);
                        } else {
                            list.innerHTML = '<li class="loading">No networks found<br><span class="scan-btn" onclick="scanRetries=0;loadNetworks()">Scan again</span></li>';
                        }
                        return;
                    }

                    scanRetries = 0;
                    list.innerHTML = '';
                    networks.forEach(network => {
                        const li = document.createElement('li');
                        li.className = 'network-item';
                        li.innerHTML =
                            '<span class="network-icon">📶</span>' +
                            '<span class="network-name">' + network.ssid + '</span>';
                        li.onclick = () => selectNetwork(li, network.ssid);
                        list.appendChild(li);
                    });
                })
                .catch(() => {
                    list.innerHTML = '<li class="loading">Error loading networks<br><span class="scan-btn" onclick="scanRetries=0;loadNetworks()">Try again</span></li>';
                });
        }

        function selectNetwork(element, ssid) {
            document.querySelectorAll('.network-item').forEach(item => {
                item.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedNetwork = ssid;
            document.getElementById('password').disabled = false;
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('password').focus();
        }

        function connect() {
            if (!selectedNetwork) {
                showStatus('Please select a network', 'error');
                return;
            }

            const password = document.getElementById('password').value;
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('connectBtn').textContent = 'Connecting...';
            showStatus('Saving WiFi credentials...', 'success');

            fetch('/wifiSave', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'ssid=' + encodeURIComponent(selectedNetwork) + '&password=' + encodeURIComponent(password)
            })
            .then(response => {
                if (response.ok) {
                    showStatus('WiFi saved! Device is restarting...', 'success');
                } else {
                    showStatus('Failed to save. Try again.', 'error');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('connectBtn').textContent = 'Connect';
                }
            })
            .catch(() => {
                // Connection will drop when device reboots - this is expected
                showStatus('WiFi saved! Device is restarting...', 'success');
            });
        }

        function checkConnection() {
            fetch('/connectionStatus')
                .then(r => r.json())
                .then(data => {
                    if (data.isConnected) {
                        document.getElementById('connectedCard').style.display = 'block';
                        document.getElementById('connectedNetwork').textContent = data.network;
                    }
                })
                .catch(() => {});
        }

        function disconnect() {
            fetch('/wifiDisconnect', { method: 'POST' })
                .then(response => {
                    if (response.ok) {
                        showStatus('Disconnected', 'success');
                        document.getElementById('connectedCard').style.display = 'none';
                    }
                })
                .catch(() => { showStatus('Error disconnecting', 'error'); });
        }

        function showStatus(message, type) {
            const el = document.getElementById('status');
            el.textContent = message;
            el.className = 'status ' + type;
        }
    </script>
</body>
</html>
