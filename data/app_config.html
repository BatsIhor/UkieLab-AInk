<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Canvas Configuration</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        header .logo { font-size: 48px; margin-bottom: 8px; }
        header h1 { font-size: 24px; color: #4fc3f7; margin-bottom: 4px; }
        header .subtitle { color: #888; font-size: 14px; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 {
            color: #4fc3f7;
            margin-bottom: 16px;
            font-size: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #aaa;
            font-size: 13px;
        }
        .form-group { margin-bottom: 16px; }
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        input::placeholder { color: #666; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #4fc3f7;
            color: #000;
        }
        .btn-primary:hover:not(:disabled) { background: #29b6f6; }
        .btn-primary:disabled {
            background: #444;
            color: #777;
            cursor: not-allowed;
        }
        .status {
            text-align: center;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        .status.success {
            display: block;
            background: rgba(0, 200, 83, 0.15);
            border: 1px solid #00c853;
            color: #95d5b2;
        }
        .status.error {
            display: block;
            background: rgba(255, 100, 100, 0.15);
            border: 1px solid #ff6464;
            color: #f48c8c;
        }
        .info-box {
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #aaa;
        }
        .info-box code {
            color: #4fc3f7;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }
        footer {
            text-align: center;
            margin-top: 24px;
            padding-bottom: 20px;
            color: #555;
            font-size: 13px;
        }
        footer a { color: #4fc3f7; text-decoration: none; margin: 0 10px; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">&#9618;</div>
            <h1>AI Canvas</h1>
            <p class="subtitle">E-Ink Display for AI Agents</p>
        </header>

        <div id="status" class="status"></div>

        <div class="info-box">
            Send drawing commands via <code>POST /canvas</code><br>
            Discover via mDNS: <code>_aiscreen._tcp</code><br>
            API spec: <code>GET /openapi.json</code>
        </div>

        <div class="card">
            <h2>Device Settings</h2>

            <div class="form-group">
                <label for="deviceName">Device Name</label>
                <input type="text" id="deviceName" placeholder="ai-canvas" />
            </div>

            <button id="saveBtn" class="btn btn-primary" onclick="saveConfig()">
                Save Settings
            </button>
        </div>

        <footer>
            <a href="/">Settings</a> |
            <a href="/wifi">WiFi</a> |
            <a href="/update">Update</a> |
            <a href="/health">Health</a>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
        });

        function loadConfig() {
            fetch('/api/app/config')
                .then(r => r.json())
                .then(data => {
                    if (data.deviceName) {
                        document.getElementById('deviceName').value = data.deviceName;
                    }
                })
                .catch(() => {});
        }

        function saveConfig() {
            var btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            var config = {
                deviceName: document.getElementById('deviceName').value || 'ai-canvas'
            };

            fetch('/api/app/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    if (data.needWifi) {
                        showStatus('Settings saved! Redirecting to WiFi setup...', 'success');
                        document.getElementById('status').innerHTML = 'Settings saved! <a href="/wifi" style="color:white;text-decoration:underline">Click here if not redirected</a>';
                        setTimeout(function() { window.location.replace('/wifi'); }, 1500);
                    } else {
                        showStatus('Settings saved!', 'success');
                    }
                } else {
                    showStatus('Error saving settings', 'error');
                }
                btn.disabled = false;
                btn.textContent = 'Save Settings';
            })
            .catch(() => {
                showStatus('Network error', 'error');
                btn.disabled = false;
                btn.textContent = 'Save Settings';
            });
        }

        function showStatus(message, type) {
            var el = document.getElementById('status');
            el.textContent = message;
            el.className = 'status ' + type;
        }
    </script>
</body>
</html>
