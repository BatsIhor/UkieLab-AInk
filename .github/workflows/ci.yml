# CI Pipeline — Build & validate on every PR and push to main
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Create version marker
        # Prevent the version increment script from bumping the version during CI
        run: touch .version_no_increment

      - name: Build firmware
        run: pio run -e aicanvas_esp32_75bw

      - name: Build SPIFFS filesystem image
        run: pio run -e aicanvas_esp32_75bw -t buildfs

      - name: Upload build artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-pr-${{ github.event.pull_request.number }}
          path: |
            .pio/build/aicanvas_esp32_75bw/firmware.bin
            .pio/build/aicanvas_esp32_75bw/spiffs.bin
          retention-days: 7
