# CI Pipeline — Build & validate on every PR
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.environment }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          - aicanvas_esp32_75bw
          - aicanvas_esp32_102bw

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.environment }}

      - name: Build SPIFFS filesystem image
        run: pio run -e ${{ matrix.environment }} -t buildfs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.environment }}-pr-${{ github.event.pull_request.number }}
          path: |
            .pio/build/${{ matrix.environment }}/firmware.bin
            .pio/build/${{ matrix.environment }}/spiffs.bin
          retention-days: 7
