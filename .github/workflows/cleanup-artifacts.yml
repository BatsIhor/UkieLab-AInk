# Artifact Cleanup — Remove old workflow artifacts to save storage
name: Cleanup Artifacts

on:
  schedule:
    # Every Sunday at 3:00 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:  # Allow manual trigger

jobs:
  cleanup:
    name: Delete Old Artifacts
    runs-on: ubuntu-latest

    permissions:
      actions: write  # Required for deleting artifacts

    steps:
      - name: Delete old workflow artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const RETENTION_DAYS = 7;
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - RETENTION_DAYS);

            console.log(`Deleting artifacts older than ${cutoffDate.toISOString()}`);

            let deletedCount = 0;
            let freedBytes = 0;

            // Paginate through all artifacts
            for await (const response of github.paginate.iterator(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            )) {
              for (const artifact of response.data) {
                const createdAt = new Date(artifact.created_at);
                if (createdAt < cutoffDate) {
                  console.log(
                    `Deleting: ${artifact.name} ` +
                    `(created ${artifact.created_at}, ` +
                    `size ${(artifact.size_in_bytes / 1024 / 1024).toFixed(2)} MB)`
                  );
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id,
                  });
                  deletedCount++;
                  freedBytes += artifact.size_in_bytes;
                }
              }
            }

            if (deletedCount === 0) {
              console.log("No artifacts older than the retention period found.");
            } else {
              console.log(
                `\nDone! Deleted ${deletedCount} artifact(s), ` +
                `freed ${(freedBytes / 1024 / 1024).toFixed(2)} MB.`
              );
            }
