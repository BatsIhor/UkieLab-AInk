; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = aicanvas_esp32_75bw
src_dir = .
boards_dir = boards

[common_env_data]
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps =
	Wire
	bblanchon/ArduinoJson@^6.19.4
	FS
	Update
	khoih-prog/ESP_MultiResetDetector@^1.3.1
	esphome/ESPAsyncWebServer-esphome@^3.1.0
extra_scripts =
	pre:platformio_version_increment/version_increment_pre.py
	post:platformio_version_increment/version_increment_post.py

; AI Canvas - 7.5" B/W E-Ink Display (always-on HTTP server)
[env:aicanvas_esp32_75bw]
platform = espressif32
board = esp32dev
framework = ${common_env_data.framework}
upload_speed = ${common_env_data.upload_speed}
monitor_speed = ${common_env_data.monitor_speed}
monitor_filters = time, colorize, esp32_exception_decoder
board_build.partitions = partitions_ota_large_app.csv
build_src_filter =
	+<*>
lib_deps =
	${common_env_data.lib_deps}
	bitbank2/PNGdec@^1.0.1
	ricmoo/QRCode@^0.0.1
build_flags =
	-D AI_CANVAS=1
	-D EPD_BW_ONLY=1
	-D epd75_3c=1
	-D FIRMWARE_ENVIRONMENT=\"aicanvas_esp32_75bw\"
	-D CONFIG_ESP_TASK_WDT_TIMEOUT_S=10
extra_scripts = ${common_env_data.extra_scripts}
